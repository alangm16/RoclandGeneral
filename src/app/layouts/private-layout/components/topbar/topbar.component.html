<mat-toolbar class="topbar">
  <div class="topbar-inner">
    
    <div class="topbar-left">
      <button mat-icon-button (click)="toggleSidenav.emit()" class="sidebar-toggle">
        <i class="bi bi-list"></i>
      </button>
      
      <div class="brand-context">
        <span class="brand-name">ROCLAND</span>
        @if (projectName()) {
          <span class="brand-divider">|</span>
          <span class="project-name">{{ projectName() }}</span>
        }
      </div>
    </div>

    <div class="topbar-right">
      <div class="clock">
        <i class="bi bi-clock"></i>
        <span>{{ currentTime() }}</span>
      </div>

      <button mat-button [matMenuTriggerFor]="userMenu" class="user-profile-btn">
        <div class="profile-content">
          <div class="user-avatar">
            {{ userName().charAt(0) || 'U' | uppercase }}
          </div>
          <div class="user-info-text">
            <span class="user-name">{{ userName() }}</span>
            <span class="user-status">En línea</span>
          </div>
          <i class="bi bi-chevron-down chevron-icon"></i>
        </div>
      </button>
      
      <mat-menu #userMenu="matMenu" class="custom-profile-menu" xPosition="before">
        <div class="menu-header">
          <div class="menu-avatar-lg">
            {{ userName().charAt(0) || 'U' | uppercase }}
          </div>
          <div class="menu-user-info">
            <span class="menu-name">{{ userName() }}</span>
            <span class="menu-role">Sesión Activa</span>
          </div>
        </div>
        
        <div class="menu-divider"></div>

        <button mat-menu-item class="menu-item-logout" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </div>

  </div>
</mat-toolbar>
