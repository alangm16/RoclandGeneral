@if (config.title) {
  <div class="subheader">
    <div class="subheader-inner">
      
      <div class="subheader-left">
        <h2 class="page-title">{{ config.title || 'Rocland' }}</h2>

        @if (config.showSearch) {
          <div class="divider"></div>
          
          <div class="search-wrapper">
            <i class="bi bi-search"></i>
            <input 
              type="text" 
              [placeholder]="config.searchPlaceholder || 'Buscar...'" 
              class="search-input"
              [value]="layoutService.searchValue()"
              (input)="onSearchChange($event)">
          </div>
        }

        <div class="filter-actions-inline">
          @for (action of config.actions; track action.label) {
            @if (action.variant === 'flat') {
              <button mat-flat-button
                [color]="action.color === 'warn' ? 'warn' : 'primary'"
                (click)="action.handler()">
                @if(action.icon) { <i class="bi {{action.icon}}"></i> }
                {{ action.label }}
              </button>
            }
            @if (action.variant === 'stroked') {
              <button mat-stroked-button
                [style.color]="action.color === 'warn' ? 'var(--red)' : null"
                (click)="action.handler()">
                @if(action.icon) { <i class="bi {{action.icon}}"></i> }
                {{ action.label }}
              </button>
            }
          }
        </div>

        <div class="filters-area">
          <ng-content select="[subheader-filters]"></ng-content>
        </div>
      </div>

      <div class="subheader-right">
        @if (config.showExport) {
          <button mat-stroked-button (click)="config.showExport">
            <i class="bi bi-download"></i>
            Exportar
          </button>
        }
        @if (config.showAddButton) {
          <button mat-flat-button color="primary" class="add-button"
            (click)="config.addHandler ? config.addHandler() : null">
            <i class="bi bi-plus-lg"></i>
            {{ config.addButtonLabel || 'Agregar' }}
          </button>
        }
        <ng-content select="[subheader-actions]"></ng-content>
      </div>

    </div>
  </div>
}
